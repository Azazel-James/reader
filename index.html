<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="p-5">
    <header class="mt-5">
      <div class="mx-auto">
        <h1 class="text-center">Bonjour!</h1>

        <div class="row">
          <label for="zipFileInput" class="form-label"
            >1. Choisissez le dossier à traiter</label
          >
          <input
            class="form-control mt-3"
            type="file"
            accept="application/zip"
            id="zipFileInput"
          />
        </div>

        <article class="mt-3">
          <div class="row">
            <label for="tabSelect" class="form-label"
              >2. Sélectionnez une table à afficher</label
            >
            <select class="form-select" id="tabSelect">
              <option value="">-- Choisir une table --</option>
            </select>
          </div>
          <a id="exportBtn" class="btn btn-primary my-3">Exporter</a>
        </article>
      </div>
    </header>

    <main class="">
      <div id="verify">
        <!-- Résultat de la vérification -->
        <article class="card-body"></article>
      </div>

      <div class="card my-5 mx-auto">
        <!-- Elements de la table -->
        <article id="tabStructure"></article>
      </div>
    </main>

    <footer>
      <nav aria-label="Page navigation">
        <ul class="pagination justify-content-end me-5">
          <!-- Pagination -->
        </ul>
      </nav>
    </footer>

    <script type="importmap">
      {
        "imports": {
          "zip.js": "/node_modules/@zip.js/zip.js/dist/zip.js"
        }
      }
    </script>
    <script src="sql-wasm.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
