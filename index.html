<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Test</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />
    </head>

    <body class="p-5">
        <header>
            <h1 class="text-center">Bonjour!</h1>

            <div class="row my-4">
                <div class="row justify-content-center">
                    <div class="col-4">
                        <label for="zipFileInput" class="form-label ms-4"> 1. Choisissez le dossier à traiter </label>
                    </div>
                </div>
                <div class="row justify-content-center">
                    <div class="col-4">
                        <input class="form-control" type="file" accept="application/zip" id="zipFileInput" />
                    </div>
                </div>
            </div>

            <div class="row my-4">
                <div class="row justify-content-center">
                    <div class="col-4">
                        <label for="tabSelect" class="form-label ms-4"> 2. Sélectionnez une table à afficher </label>
                    </div>
                </div>
                <div class="row justify-content-center">
                    <div class="col-4 offset-1">
                        <select class="form-select" id="tabSelect">
                            <option value="">-- Choisir une table --</option>
                        </select>
                    </div>
                    <div class="col-1">
                        <a id="exportBtn" class="btn btn-primary">Exporter</a>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-10">
                    <div id="verify">
                        <article class="card-body"></article>
                    </div>
                </div>
                <div class="col-1 align-self-center">
                    <a id="verifyBtn" class="btn btn-outline-success">Vérifier</a>
                </div>
            </div>
        </header>

        <main class="my-3">
            <article id="tabStructure"></article>
        </main>

        <footer>
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <!-- Pagination -->
                </ul>
            </nav>
        </footer>

        <script type="importmap">
            {
                "imports": {
                    "zip.js": "/node_modules/@zip.js/zip.js/dist/zip.js"
                }
            }
        </script>
        <script src="sql-wasm.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
